<section class="conditions glass-card" aria-label="Current weather conditions">
  <header class="conditions__header">
    <h2 class="conditions__location">{{ locationName }}</h2>
    <p class="conditions__label">{{ label() }}</p>
    <div class="conditions__clock">
      <p class="conditions__time" aria-label="Local time">{{ localTime() }}</p>
      <p class="conditions__date">{{ localDate() }}</p>
    </div>
  </header>

  <div class="conditions__main">
    <span class="conditions__icon" aria-hidden="true">{{ icon() }}</span>
    <span class="conditions__temp" [attr.aria-label]="'Temperature ' + (weather.temperature | temperature)">{{ weather.temperature | temperature }}</span>
  </div>

  <div class="conditions__meta">
    <div class="conditions__stat">
      <span class="conditions__stat-label">Feels like</span>
      <span class="conditions__stat-value">{{ weather.feelsLike | temperature }}</span>
    </div>
    <div class="conditions__stat">
      <span class="conditions__stat-label">Humidity</span>
      <span class="conditions__stat-value">{{ weather.humidity }}%</span>
    </div>
    <div class="conditions__stat">
      <span class="conditions__stat-label">Wind</span>
      <span class="conditions__stat-value">{{ weather.windSpeed }} km/h {{ windDirection() }}</span>
    </div>
  </div>
</section>
