<section class="forecast-hourly glass-card">
  <h3 class="forecast-hourly__title">Hourly Forecast</h3>
  @if (items().length) {
    <div class="forecast-hourly__row">
      @for (item of items(); track item.time) {
        <app-forecast-hour-item
          [time]="item.time"
          [temperature]="item.temperature"
          [weatherCode]="item.weatherCode"
          [isCurrent]="item.isCurrent"
        />
      }
    </div>
  }
</section>
