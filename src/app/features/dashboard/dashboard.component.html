<div class="dashboard" [class]="'theme-' + facade.theme()">
  <div class="dashboard__inner">
    <app-location-search
      [results]="facade.searchResults()"
      [loading]="facade.searchLoading()"
      (citySearch)="onSearch($event)"
      (locationSelected)="onLocationSelected($event)"
      (cleared)="onSearchClear()"
    />

    @if (facade.loading()) {
      <div class="dashboard__loading" role="status" aria-live="polite">
        <span class="dashboard__spinner" aria-hidden="true"></span>
        <p>Fetching weather…</p>
      </div>
    }

    @if (facade.error()) {
      <div class="dashboard__error" role="alert" aria-live="assertive">
        <p>{{ facade.error() }}</p>
      </div>
    }

    <div class="dashboard__controls">
      <button
        class="dashboard__unit-toggle"
        (click)="onToggleUnit()"
        [attr.aria-label]="'Switch to ' + (facade.unit() === 'C' ? 'Fahrenheit' : 'Celsius')"
      >°{{ facade.unit() === 'C' ? 'F' : 'C' }}</button>
    </div>

    @if (facade.weather(); as weather) {
      <app-current-conditions [weather]="weather.current" [locationName]="facade.locationName()" [timezone]="weather.timezone" />
      <app-weather-insight
        [insight]="facade.aiInsight()"
        [loading]="facade.aiLoading()"
        [error]="facade.aiError()"
      />
      <app-forecast-hourly [hourly]="weather.hourly" [currentTime]="weather.current.time" />
      <app-forecast-daily [daily]="weather.daily" />
    }
  </div>
</div>
