<div class="dashboard" [class]="'theme-' + facade.theme()">
  <div class="dashboard__inner">
    <app-location-search
      [results]="facade.searchResults()"
      [loading]="facade.searchLoading()"
      (search)="onSearch($event)"
      (locationSelected)="onLocationSelected($event)"
      (cleared)="onSearchClear()"
    />

    @if (facade.loading()) {
      <div class="dashboard__loading">
        <span class="dashboard__spinner"></span>
        <p>Fetching weather…</p>
      </div>
    }

    @if (facade.error()) {
      <div class="dashboard__error">
        <p>{{ facade.error() }}</p>
      </div>
    }

    @if (facade.weather(); as weather) {
      <app-current-conditions [weather]="weather.current" [location]="facade.location()" />
      <app-forecast-hourly [hourly]="weather.hourly" [currentTime]="weather.current.time" />
      <app-forecast-daily [daily]="weather.daily" />
    }
  </div>
</div>
