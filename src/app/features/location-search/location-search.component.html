<div class="search">
  <div class="search__field glass-card">
    <span class="search__icon">🔍</span>
    <input
      #searchInput
      class="search__input"
      type="text"
      placeholder="Search city…"
      autocomplete="off"
      maxlength="100"
      spellcheck="false"
      (input)="onInput($event)"
    />
    @if (loading) {
      <span class="search__spinner"></span>
    }
    @if (searchInput.value) {
      <button class="search__clear" (click)="onClear()" aria-label="Clear">✕</button>
    }
  </div>

  @if (results.length > 0) {
    <ul class="search__results glass-card">
      @for (location of results; track location.name) {
        <li class="search__result" (click)="onSelect(location)">
          <span class="search__result-name">{{ location.name }}</span>
          <span class="search__result-country">{{ location.country }}</span>
        </li>
      }
    </ul>
  }
</div>
